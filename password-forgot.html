<!doctype html>
<html lang="en">
  <head>
    <!--CHROME:ANALYTICS-->
    <!--CHROME:META-PIXEL-->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Draw! · Forgot password</title>
    <meta name="drawbang:active" content="identity" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!--CHROME:HEADER-->
    <main class="identity-page">
      <h2>Forgot your password?</h2>
      <form class="auth-form" id="password-forgot-form" novalidate>
        <p class="muted">Enter your email and we'll send a reset link.</p>
        <label class="auth-field">
          <span>Email</span>
          <input type="email" id="password-forgot-email" name="email" autocomplete="email" required />
        </label>
        <button class="btn primary" id="password-forgot-submit" type="submit">Send reset link</button>
      </form>
    </main>
    <!--CHROME:FOOTER-->
    <script type="module" src="./src/password-forgot.ts"></script>
  </body>
</html>
