            ApiId: !Ref IngestApi
            Method: GET
            Path: /me/bookmarks/feed
        BookmarksPage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /u/{username}/bookmarks
        FollowCreate:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /users/{username}/follow
        FollowDelete:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: DELETE
            Path: /users/{username}/follow
        FollowersPage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /u/{username}/followers
        FollowersItems:
          Type: HttpApi
