            ApiId: !Ref IngestApi
            Method: ANY
            Path: /prompts
        PromptPage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /prompts/{slug}
        PromptItems:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /prompts/{slug}/items
        Admin:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: GET
            Path: /admin
        AdminData:
          Type: HttpApi
