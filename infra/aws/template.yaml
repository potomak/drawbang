AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Drawbang ingest — Lambda + API Gateway + S3 bucket + CloudFront.

Parameters:
  BucketName:
    Type: String
    Default: drawbang-assets
    Description: S3 bucket for editor, drawings, inbox, and gallery state.
  RepoUrl:
    Type: String
    Default: https://github.com/potomak/drawbang
    Description: GitHub repo URL shown in the footer of every page.
  DomainName:
    Type: String
    Default: ""
    Description: |
      Custom domain to attach to the CloudFront distribution (e.g.
      pixel.drawbang.com). Leave empty to keep the *.cloudfront.net URL only.
      An ACM certificate is requested with DNS validation; the validation
      CNAME shows up in the ACM console — add it to your DNS to finish.
  # Merch Lambda secrets. Default to "" so the deploy stays green before the
  # operator wires real values in via parameter_overrides. Until they are set,
  # MerchFunction will throw on init for any request that needs the helpers
  # (everything except /merch/products), which is the intended fail-loud
  # behaviour during staging.
  PrintifyApiToken:
    Type: String
    NoEcho: true
    Default: ""
    Description: Bearer token for the Printify REST API. Maps to PRINTIFY_API_TOKEN.
  PrintifyShopId:
    Type: String
    Default: ""
    Description: Printify shop id. Maps to PRINTIFY_SHOP_ID.
  StripeSecretKey:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe secret key (sk_test_… in test mode). Maps to STRIPE_SECRET_KEY.
  StripeWebhookSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: Stripe webhook signing secret (whsec_…). Maps to STRIPE_WEBHOOK_SECRET.
  # HS256 signing secret for session + password-reset JWTs. No default — the
  # ingest function fails loud at cold start if unset, since every publish /
  # claim / auth route depends on it. Supply via parameter_overrides from a
  # GitHub secret.
  JwtSecret:
    Type: String
    NoEcho: true
    Default: ""
    Description: HS256 secret for session + reset JWTs. Maps to JWT_SECRET.
  SesFromAddress:
    Type: String
    Default: ""
    Description: |
      Verified SES sender address for password-reset emails (e.g.
      no-reply@drawbang.com). Maps to SES_FROM_ADDRESS. Leave empty until SES
      is set up — reset requests still return 200 but no email is sent.
  # CloudFront distribution id, passed in by the workflow from the prior
  # deploy's stack outputs so the Lambda env var can reference it without
  # creating a CloudFormation circular dependency (the Lambda's env can't
  # !Ref AssetsDistribution because AssetsDistribution → IngestApi →
  # IngestFunction). Empty on the very first deploy means the publish path
  # skips CloudFront invalidation; subsequent deploys fill it in.
  CloudFrontDistributionIdOverride:
    Type: String
    Default: ""
    Description: CloudFront distribution id used by the Lambda to invalidate cached gallery/profile pages on publish.
  AdminUsernames:
    Type: String
    Default: ""
    Description: |
      Comma-separated usernames allowed to view /admin. Empty (the default)
      means nobody can — every /admin request returns 403. Supply via a
      GitHub repository variable so the value survives redeploys.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref DomainName, ""]]

Globals:
  Function:
    Runtime: nodejs22.x
    Timeout: 10
    MemorySize: 256
    Architectures: [arm64]

Resources:
  # -- Assets bucket -----------------------------------------------------------
  # Holds (under public/, served by CloudFront):
  #   draw.html                  editor entry (Vite SPA, at /draw)
  #   {merch,order,login,signup,account,privacy,password-*}.html  Vite SPAs
  #   assets/*                   Vite-built JS/CSS bundles
  #   tiles/<id>.gif             published drawings (+ <id>-large.gif for OG)
  #   chrome.css, gallery-v2.css, *.js  static chrome assets
  # Dynamic HTML routes (/, /feed/items, /d/<id>, /u/<un>, /products,
  # /feed.rss) are Lambda-rendered — they don't live in S3.
  AssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      # CORS still needed because the editor's same-origin requests for the
      # state file go through CloudFront, but cross-origin scripts (e.g. an
      # embedded view from another site) might also fetch a gif. Keep open
      # GET/HEAD; everything is public anyway.
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, HEAD]
            AllowedOrigins: ["*"]
            MaxAge: 3600

  # CloudFront uses Origin Access Control (OAC) to read from S3. The bucket
  # itself stays private; only this distribution can fetch through it.
  AssetsOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${BucketName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # CloudFront Function: append `.html` to clean URLs like /d/<id>, /gallery,
  # /days/<d>/p/<n>. Runs at the viewer-request stage so S3 sees the full path.
  RewriteCleanUrls:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "${BucketName}-rewrite"
      AutoPublish: true
      FunctionConfig:
        Comment: Append .html to clean gallery URLs.
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var req = event.request;
          var uri = req.uri;
          // This Function runs only on the default S3 cache behaviour. The
          // dynamic Lambda routes (/, /feed/items, /d/*, /u/*, /products*,
          // /feed.rss) match their own behaviours and skip this Function
          // entirely.
          //
          // Rewrites:
          //   /draw                      -> /draw.html  (Vite SPA: editor)
          //   /merch                     -> /merch.html  (Vite SPA)
          //   /merch/order/<uuid>        -> /order.html  (Vite SPA)
          //   /login /signup /password/* /account -> *.html  (Vite SPAs)
          //   /privacy                   -> /privacy.html
          //   /404                       -> /404.html
          //   /drawings/<id>.gif         -> /tiles/<id>.gif  (legacy asset)
          //
          // Redirects:
          //   /t/<id>                    -> 301 /d/<id>  (legacy drawing URL)
          //   /gallery                   -> 301 /        (feed is the new home)
          //   /gallery/items?cursor=…    -> 301 /feed/items?cursor=…
          var tMatch = uri.match(/^\/t\/([0-9a-f]{64})$/);
          if (tMatch) {
            return {
              statusCode: 301,
              statusDescription: "Moved Permanently",
              headers: { location: { value: "/d/" + tMatch[1] } },
            };
          }
          if (uri === "/gallery") {
            return {
              statusCode: 301,
              statusDescription: "Moved Permanently",
              headers: { location: { value: "/" } },
            };
          }
          if (uri === "/gallery/items") {
            // querystring on /gallery/items is the cursor; preserve it.
            var qs = event.request.querystring;
            var loc = "/feed/items";
            if (qs && typeof qs === "object") {
              var parts = [];
              for (var k in qs) {
                if (qs[k] && typeof qs[k].value === "string") {
                  parts.push(encodeURIComponent(k) + "=" + encodeURIComponent(qs[k].value));
                }
              }
              if (parts.length) loc += "?" + parts.join("&");
            }
            return {
              statusCode: 301,
              statusDescription: "Moved Permanently",
              headers: { location: { value: loc } },
            };
          }
          var aMatch = uri.match(/^\/drawings\/([0-9a-f]{64}(?:-large)?\.gif)$/);
          if (aMatch) {
            req.uri = "/tiles/" + aMatch[1];
            return req;
          }
          if (uri === "/draw") {
            req.uri = "/draw.html";
          } else if (uri === "/merch") {
            req.uri = "/merch.html";
          } else if (/^\/merch\/order\/[0-9a-f-]{36}$/.test(uri)) {
            req.uri = "/order.html";
          } else if (uri === "/login") {
            req.uri = "/login.html";
          } else if (uri === "/signup") {
            req.uri = "/signup.html";
          } else if (uri === "/password/forgot") {
            req.uri = "/password-forgot.html";
          } else if (uri === "/password/reset") {
            req.uri = "/password-reset.html";
          } else if (uri === "/account") {
            req.uri = "/account.html";
          } else if (uri === "/privacy") {
            req.uri = "/privacy.html";
          } else if (uri === "/404") {
            req.uri = "/404.html";
          }
          return req;
        }

  # ACM certificate for the custom domain. Lives in us-east-1 because
  # CloudFront viewer certs must be in us-east-1. DNS validation: ACM
  # publishes a CNAME under the cert that we (or the operator) must
  # add at the DNS provider; the stack pauses until the CNAME resolves
  # and the cert reaches Issued.
  AssetsCert:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref DomainName
      ValidationMethod: DNS

  # Cache policy for the dynamic /gallery + /d/<id> + /u/<un> + /feed.rss
  # routes that go through Lambda. Honours the origin's Cache-Control
  # header (the render handlers set s-maxage=86400 + stale-while-revalidate
  # for gallery + profile, max-age=31536000 for drawing pages), varies the
  # cache key on the cursor query string, and ignores client headers /
  # cookies so identical URLs share a single edge entry.
  DynamicCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: drawbang-dynamic
        Comment: Dynamic HTML routes — caches per-URL based on origin Cache-Control.
        MinTTL: 0
        DefaultTTL: 60
        MaxTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          QueryStringsConfig: { QueryStringBehavior: all }
          HeadersConfig: { HeaderBehavior: none }
          CookiesConfig: { CookieBehavior: none }

  AssetsDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Drawbang editor + feed home + drawings.
        # No DefaultRootObject: the root path / is its own behavior that
        # routes to the Lambda feed handler. The editor lives at /draw.
        PriceClass: PriceClass_100
        HttpVersion: http2and3
        Origins:
          - Id: assets
            DomainName: !GetAtt AssetsBucket.RegionalDomainName
            # Strip the bucket's `public/` prefix so users can hit clean
            # URLs like /draw.html, /tiles/<id>.gif while objects sit
            # under public/ in S3.
            OriginPath: /public
            S3OriginConfig:
              OriginAccessIdentity: ""
            OriginAccessControlId: !GetAtt AssetsOAC.Id
          # API Gateway in front of the ingest Lambda. The dynamic-HTML
          # behaviours below route /gallery + /d/<id> + /u/<un> + /feed.rss
          # to this origin so the Lambda render handlers serve them.
          - Id: api
            DomainName: !Sub "${IngestApi}.execute-api.${AWS::Region}.amazonaws.com"
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        DefaultCacheBehavior:
          TargetOriginId: assets
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD]
          CachedMethods: [GET, HEAD]
          Compress: true
          # Managed CachingOptimized: forwards no headers/cookies, caches by URL.
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RewriteCleanUrls.FunctionMetadata.FunctionARN
        CacheBehaviors:
          # / (the feed home, exact path). Replaces the legacy /gallery
          # behavior — /gallery itself now 301s here via the CF function.
          - PathPattern: /
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /feed/items?cursor=... HTML fragment endpoint (infinite scroll).
          - PathPattern: /feed/items
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /d/<64hex> single-drawing pages.
          - PathPattern: /d/*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /embed/<64hex> iframe player pages.
          - PathPattern: /embed/*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /u/<username>/bookmarks — owner-only page. Must come before the
          # generic /u/* behaviour (CloudFront picks the longest match) so
          # we forward the Authorization header to Lambda; the page is
          # private/no-store so caching is disabled too.
          - PathPattern: /u/*/bookmarks
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /u/<username> profile + /u/<username>/items fragments.
          - PathPattern: /u/*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          - PathPattern: /feed.rss
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /design — visual reference for the design system (see
          # docs/design-system.md). Short s-maxage so token swaps land
          # quickly when iterating.
          - PathPattern: /design
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /products (exact) + /products/p/<N>. Split for the same reason
          # /gallery is — keep wildcards off the asset-prefix space.
          - PathPattern: /products
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          - PathPattern: /products/*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /prompts archive + /prompts/<slug> submission pages +
          # /prompts/<slug>/items fragments. Public dynamic HTML, same
          # policy as /u/* — DynamicCachePolicy keys on the cursor query
          # string and honours the handlers' CC_GALLERY s-maxage.
          - PathPattern: /prompts*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: !Ref DynamicCachePolicy
          # /auth/* (POST register/login/forgot/reset/profile-picture) — runs
          # through CloudFront so in-page scripts on /d/<id> can call the
          # profile-picture endpoint with a relative URL. Caching is disabled (each request
          # carries its own JWT), and OriginRequestPolicy = managed
          # AllViewerExceptHostHeader forwards Authorization + body to the
          # api origin without confusing it with the CloudFront Host.
          - PathPattern: /auth/*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /drawings/<id>/like (POST + DELETE). Same policy pair as /auth/*
          # — each request carries its own JWT, so no caching, and we
          # forward Authorization via AllViewerExceptHostHeader.
          # The trailing `/like` is required so this pattern doesn't steal
          # `/drawings/<id>.gif`, which is rewritten to `/tiles/<id>.gif`
          # by the default behavior's CloudFront Function.
          - PathPattern: /drawings/*/like
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /hydrate?drawings=…&users=… — single hydration channel for
          # every cached SSR page. Public, no-store. Optional Bearer JWT
          # populates the viewer_* fields (forwarded via
          # AllViewerExceptHostHeader). Any future "X is stale on the
          # cached feed" bug folds into this endpoint — no new behaviour.
          - PathPattern: /hydrate
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /drawings/<id>/bookmark (POST + DELETE). Same JWT-auth pattern
          # as /drawings/<id>/like; the trailing `/bookmark` keeps it
          # disjoint from the gif rewrite.
          - PathPattern: /drawings/*/bookmark
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /me/bookmarks/feed — auth-gated HTML fragment of the caller's
          # bookmarks, loaded by the inline boot script on /u/<un>/bookmarks.
          # (The hydration subset that used to live here moved into /hydrate.)
          - PathPattern: /me/bookmarks/feed
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /users/<un>/follow (POST + DELETE) — toggle a follow edge.
          # Same Authorization-forwarding pattern as /drawings/<id>/like.
          - PathPattern: /users/*/follow
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [DELETE, GET, HEAD, OPTIONS, PATCH, POST, PUT]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
          # /admin (the public shell page) + /admin/data (Bearer-gated
          # HTML fragment fetched by the shell's inline boot script).
          # Browser navs to /admin don't carry the JWT, so the shell
          # itself is unauthenticated; the data fetch is gated server-
          # side. Both responses are Cache-Control: private, no-store,
          # so neither the edge nor the browser stores them. AllViewer-
          # ExceptHostHeader forwards Authorization so /admin/data
          # sees the Bearer token.
          - PathPattern: /admin*
            TargetOriginId: api
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD, OPTIONS]
            CachedMethods: [GET, HEAD]
            Compress: true
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        # Map S3 misses to the chrome'd /404.html the builder writes. Both
        # codes are routed because OAC returns 403 for keys outside the
        # public/* prefix and 404 for missing keys inside it. Short cache
        # TTL so a freshly-published drawing isn't pinned to 404 by edge
        # caches after a transient miss.
        CustomErrorResponses:
          - ErrorCode: 404
            ResponsePagePath: /404.html
            ResponseCode: 404
            ErrorCachingMinTTL: 60
          - ErrorCode: 403
            ResponsePagePath: /404.html
            ResponseCode: 404
            ErrorCachingMinTTL: 60
        Aliases: !If [HasCustomDomain, [!Ref DomainName], !Ref AWS::NoValue]
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref AssetsCert
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - !Ref AWS::NoValue

  # Lock down S3: only the CloudFront distribution can read /public/*.
  AssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AssetsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${AssetsBucket.Arn}/public/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${AssetsDistribution}"

  # -- Merch orders DynamoDB table --------------------------------------------
  # The merch Lambda (added in #72) will need:
  #   Policies:    - DynamoDBCrudPolicy: { TableName: !Ref OrdersTable }
  #   Environment: ORDERS_TABLE: !Ref OrdersTable
  # Table only — no IAM grant or env var until the merch function exists.
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-orders
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: order_id,   AttributeType: S }
        - { AttributeName: status,     AttributeType: S }
        - { AttributeName: created_at, AttributeType: S }
      KeySchema:
        - { AttributeName: order_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: status-created_at-index
          KeySchema:
            - { AttributeName: status,     KeyType: HASH }
            - { AttributeName: created_at, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # -- Product counters DynamoDB table ----------------------------------------
  # Denormalised (drawing_id, product_id) → count for the /products gallery
  # (epic #151). Incremented by the merch Lambda when an order transitions
  # paid → submitted; read by the daily builder to rank cards by popularity.
  # GSI partitioned by the literal "all" so a single Query yields top-N by
  # count without scanning the table.
  ProductCountersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-product-counters
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: pk,    AttributeType: S }
        - { AttributeName: _g,    AttributeType: S }
        - { AttributeName: count, AttributeType: N }
      KeySchema:
        - { AttributeName: pk, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: all-count-index
          KeySchema:
            - { AttributeName: _g,    KeyType: HASH }
            - { AttributeName: count, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # Per-account aggregated streak + total counters for #115/#116. One row
  # per author with daily-drawings dimension, updated under optimistic
  # concurrency from the ingest handler.
  # Account-keyed (user_id) streak/total counters. Named -account-stats, not
  # -user-stats: the original table was keyed on the keypair `pubkey`, and
  # changing a DynamoDB partition key forces a replacement that CloudFormation
  # refuses for a fixed-name table. The rename lets CFN create the new table +
  # drop the stale one in one update. (Old data was keypair-era, discardable.)
  UserStatsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-account-stats
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: user_id, AttributeType: S }
      KeySchema:
        - { AttributeName: user_id, KeyType: HASH }

  # -- Account tables ---------------------------------------------------------
  # Email/password accounts. The users table is keyed by email (login + reset
  # lookups); user_id + username are attributes. The usernames table reserves
  # each handle — register() writes both in one TransactWriteItems so email AND
  # username uniqueness are enforced atomically.
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: email, AttributeType: S }
      KeySchema:
        - { AttributeName: email, KeyType: HASH }

  UsernamesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-usernames
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: username, AttributeType: S }
      KeySchema:
        - { AttributeName: username, KeyType: HASH }

  # Source of truth for published drawings in the dynamic-site world. The
  # ingest handler dual-writes a row alongside the inbox/S3 sidecar so the
  # new /gallery + /d/<id> + /u/<username> + /feed.rss routes can serve
  # without waiting for the builder. Sparse `parent_id` means GSI3 only
  # indexes drawings that are forks of another (saves write cost on the
  # majority of rows).
  DrawingsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-drawings
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: drawing_id, AttributeType: S }
        - { AttributeName: gallery_pk, AttributeType: S }
        - { AttributeName: username, AttributeType: S }
        - { AttributeName: parent_id, AttributeType: S }
        - { AttributeName: prompt_id, AttributeType: S }
        - { AttributeName: created_at_ms, AttributeType: N }
      KeySchema:
        - { AttributeName: drawing_id, KeyType: HASH }
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - { AttributeName: gallery_pk,    KeyType: HASH }
            - { AttributeName: created_at_ms, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI2
          KeySchema:
            - { AttributeName: username,      KeyType: HASH }
            - { AttributeName: created_at_ms, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI3
          KeySchema:
            - { AttributeName: parent_id,     KeyType: HASH }
            - { AttributeName: created_at_ms, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI4
          KeySchema:
            - { AttributeName: prompt_id,     KeyType: HASH }
            - { AttributeName: created_at_ms, KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # ❤️ likes on drawings. PK=drawing_id, SK=user_id; one row per (drawing,
  # user) pair. The denormalised like_count attribute lives on DrawingsTable
  # and is bumped transactionally with the row write/delete here.
  # GSI1-user inverts the table to (user_id, created_at_ms) for a future
  # "drawings I liked" feed — KEYS_ONLY since the consumer only needs ids.
  LikesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-likes
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: drawing_id, AttributeType: S }
        - { AttributeName: user_id, AttributeType: S }
        - { AttributeName: created_at_ms, AttributeType: N }
      KeySchema:
        - { AttributeName: drawing_id, KeyType: HASH }
        - { AttributeName: user_id, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1-user
          KeySchema:
            - { AttributeName: user_id, KeyType: HASH }
            - { AttributeName: created_at_ms, KeyType: RANGE }
          Projection: { ProjectionType: KEYS_ONLY }

  # Follow edges between accounts (#202). PK=follower_user_id,
  # SK=followee_user_id (uniqueness on the pair). Two GSIs re-key on
  # created_at_ms — one per direction — so /following and /followers
  # both query newest-first without scanning. Usernames are denormalised
  # onto each row at write time (CLAUDE.md: usernames are immutable in
  # v1) so list-page renders don't need a second-table hop.
  # follower_count + following_count live on drawbang-users; the
  # follow/unfollow TransactWrite touches both tables atomically.
  FollowsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-follows
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: follower_user_id, AttributeType: S }
        - { AttributeName: followee_user_id, AttributeType: S }
        - { AttributeName: created_at_ms,    AttributeType: N }
      KeySchema:
        - { AttributeName: follower_user_id, KeyType: HASH }
        - { AttributeName: followee_user_id, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1-follower
          KeySchema:
            - { AttributeName: follower_user_id, KeyType: HASH }
            - { AttributeName: created_at_ms,    KeyType: RANGE }
          Projection: { ProjectionType: ALL }
        - IndexName: GSI2-followee
          KeySchema:
            - { AttributeName: followee_user_id, KeyType: HASH }
            - { AttributeName: created_at_ms,    KeyType: RANGE }
          Projection: { ProjectionType: ALL }

  # Bookmarks: per-user list of saved drawings. PK=user_id (the saver),
  # SK=drawing_id; one row per (user, drawing) pair so "already
  # bookmarked?" is a cheap conditional Put on a known composite key.
  # GSI1-recent re-keys on (user_id, created_at_ms) for the newest-first
  # listing on /u/<username>/bookmarks — KEYS_ONLY because
  # render-handlers.ts re-fetches the DrawingRow per id anyway.
  BookmarksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: drawbang-bookmarks
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: user_id, AttributeType: S }
        - { AttributeName: drawing_id, AttributeType: S }
        - { AttributeName: created_at_ms, AttributeType: N }
      KeySchema:
        - { AttributeName: user_id, KeyType: HASH }
        - { AttributeName: drawing_id, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: GSI1-recent
          KeySchema:
            - { AttributeName: user_id, KeyType: HASH }
            - { AttributeName: created_at_ms, KeyType: RANGE }
          Projection: { ProjectionType: KEYS_ONLY }

  # -- Ingest Lambda + API Gateway --------------------------------------------

  IngestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: drawbang-ingest
      Handler: lambda.handler
      CodeUri: ../../dist-lambda
      Environment:
        Variables:
          DRAWBANG_BUCKET: !Ref AssetsBucket
          PUBLIC_BASE_URL: !If
            - HasCustomDomain
            - !Sub "https://${DomainName}"
            - !Sub "https://${AssetsDistribution.DomainName}"
          REPO_URL: !Ref RepoUrl
          DRAWBANG_USER_STATS_TABLE: !Ref UserStatsTable
          DRAWBANG_USERS_TABLE: !Ref UsersTable
          DRAWBANG_USERNAMES_TABLE: !Ref UsernamesTable
          DRAWBANG_DRAWINGS_TABLE: !Ref DrawingsTable
          DRAWBANG_LIKES_TABLE: !Ref LikesTable
          DRAWBANG_BOOKMARKS_TABLE: !Ref BookmarksTable
          DRAWBANG_FOLLOWS_TABLE: !Ref FollowsTable
          CF_DISTRIBUTION_ID: !Ref CloudFrontDistributionIdOverride
          JWT_SECRET: !Ref JwtSecret
          SES_FROM_ADDRESS: !Ref SesFromAddress
          ADMIN_USERNAMES: !Ref AdminUsernames
          NODE_OPTIONS: "--enable-source-maps"
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref AssetsBucket
        - DynamoDBCrudPolicy: { TableName: !Ref UserStatsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UsersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref UsernamesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref DrawingsTable }
        - DynamoDBCrudPolicy: { TableName: !Ref LikesTable }
        - DynamoDBCrudPolicy: { TableName: !Ref BookmarksTable }
        - DynamoDBCrudPolicy: { TableName: !Ref FollowsTable }
        # The /products handler queries the merch popularity counters (the
        # MerchFunction is the writer; ingest only reads here).
        - DynamoDBReadPolicy: { TableName: !Ref ProductCountersTable }
        # SES send for password-reset emails. SendEmail/SendRawEmail aren't
        # resource-scopable in a useful way here (the identity ARN varies),
        # so allow on "*" — the function only ever sends reset links.
        - Statement:
            - Effect: Allow
              Action: [ses:SendEmail, ses:SendRawEmail]
              Resource: "*"
        # Invalidate the CloudFront cache after a publish so the gallery +
        # author's profile + RSS pick up the new drawing within seconds
        # instead of waiting for the s-maxage TTL. Scoped by account but
        # not by specific distribution because !Ref-ing AssetsDistribution
        # here would cycle through IngestApi back to IngestFunction.
        - Statement:
            - Effect: Allow
              Action: cloudfront:CreateInvalidation
              Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/*"
        # /admin reads CloudWatch Logs Insights against this function's own
        # log group to render the events panel. StartQuery, GetQueryResults,
        # StopQuery, DescribeQueries are the four actions the SDK needs.
        - Statement:
            - Effect: Allow
              Action:
                - logs:StartQuery
                - logs:GetQueryResults
                - logs:StopQuery
                - logs:DescribeQueries
              Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/drawbang-ingest:*"
        # /admin also needs DescribeTable on the two tables it polls for
        # ItemCount totals. DescribeTable is a control-plane action that
        # SAM's DynamoDBCrudPolicy macro does NOT grant.
        - Statement:
            - Effect: Allow
              Action: dynamodb:DescribeTable
              Resource:
                - !GetAtt UsersTable.Arn
                - !GetAtt DrawingsTable.Arn
      Events:
        Ingest:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /ingest
        UserStats:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: GET
            Path: /users/{user_id}/stats
        AuthRegister:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /auth/register
        AuthLogin:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /auth/login
        AuthForgotPassword:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /auth/password/forgot
        AuthResetPassword:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /auth/password/reset
        AuthProfilePicture:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /auth/profile-picture
        AuthGetProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: GET
            Path: /auth/profile
        AuthUpdateProfile:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /auth/profile
        HomePage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /
        FeedItems:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /feed/items
        Feed:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /feed.rss
        DesignPage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /design
        DrawingPage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /d/{id}
        EmbedPage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /embed/{id}
        ProfilePage:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
            Path: /u/{username}
        ProfileItems:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: ANY
