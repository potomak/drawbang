            Method: GET
            Path: /admin/data

  # Lambda auto-creates /aws/lambda/drawbang-ingest with infinite retention
  # on first invocation. Apply a 90-day cap once via the AWS CLI so the
  # storage bill stays bounded and the CWLogs Insights window the /admin
  # page queries has a fixed ceiling:
  #   aws logs put-retention-policy \
  #     --log-group-name /aws/lambda/drawbang-ingest \
  #     --retention-in-days 90
  # The setting survives redeploys (SAM doesn't manage the group).

  # Catches every request that reaches API Gateway with method/path/status/
  # latency + the integration error message — the layer that's silent on
  # 4xx from inside the Lambda. Application-side outcome logs (logOutcome
  # in ingest/log-outcome.ts) sit on top with domain fields (user_id,
  # drawing_id, error_code, …); the access log is the safety net when the
  # Lambda crashes before its own logging runs. Retention is short so the
  # CloudWatch ingestion bill stays in pennies even if request volume
  # 100xs (see plan: hey-not-sure-how-optimized-bubble.md, cost section).
  IngestApiAccessLogs:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/apigateway/${AWS::StackName}-ingest"
      RetentionInDays: 30

  IngestApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      AccessLogSettings:
        DestinationArn: !GetAtt IngestApiAccessLogs.Arn
        Format: '{"requestId":"$context.requestId","sourceIp":"$context.identity.sourceIp","method":"$context.httpMethod","path":"$context.path","routeKey":"$context.routeKey","status":"$context.status","integrationStatus":"$context.integrationStatus","integrationErrorMessage":"$context.integrationErrorMessage","responseLatency":"$context.responseLatency","userAgent":"$context.identity.userAgent"}'
      CorsConfiguration:
        # The custom domain is the canonical origin for the deployed editor.
        # Wildcard secondary entry covers the cloudfront.net hostname (and
        # any future origin) without referencing AssetsDistribution — doing
        # so would close a CloudFormation cycle with the new api origin
        # CloudFront points at this API.
        AllowOrigins:
          - !Sub "https://${DomainName}"
          - "*"
        AllowMethods: [GET, POST, DELETE, OPTIONS]
        AllowHeaders: [content-type, authorization]
        MaxAge: 3600

  # -- Merch Lambda + routes --------------------------------------------------
  # Shares the IngestApi HTTP API (single API Gateway, multiple integrations).
  # Routes:
  #   GET  /merch/products
  #   POST /merch/checkout
  #   POST /merch/webhook/stripe   (Stripe webhook endpoint; raw body)
  #   GET  /merch/order/{id}
  MerchFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: drawbang-merch
      Handler: merch.handler
      CodeUri: ../../dist-lambda
      # Webhook responses must come back within Stripe's 30s budget. The
      # webhook handler dispatches Printify work via a fire-and-forget
      # Lambda self-invoke (InvocationType: Event), so its own runtime is
      # ~1s. The async dispatch invocation reuses this same function and
      # can take longer — Printify's createProduct alone has been observed
      # at 22s for tees, plus uploadImage and createOrder. 60s gives the
      # async path comfortable headroom.
      Timeout: 60
      # PNG upscale + base64 encode of a few-MB image briefly spikes memory
      # well above the global 256MB. 1024MB gives headroom and (because
      # Lambda CPU scales with memory) cuts the encode time too.
      MemorySize: 1024
      Environment:
        Variables:
          ORDERS_TABLE: !Ref OrdersTable
          PRODUCT_COUNTERS_TABLE: !Ref ProductCountersTable
          PRINTIFY_API_TOKEN: !Ref PrintifyApiToken
          PRINTIFY_SHOP_ID: !Ref PrintifyShopId
          STRIPE_SECRET_KEY: !Ref StripeSecretKey
          STRIPE_WEBHOOK_SECRET: !Ref StripeWebhookSecret
          PUBLIC_BASE_URL: !If
            - HasCustomDomain
            - !Sub "https://${DomainName}"
            - !Sub "https://${AssetsDistribution.DomainName}"
          DRAWINGS_BUCKET: !Ref AssetsBucket
          # Used by the webhook handler to fire-and-forget the async
          # dispatch self-invoke. Naming the function explicitly avoids a
          # circular SAM dependency vs. !GetAtt MerchFunction.Arn.
          MERCH_FUNCTION_NAME: drawbang-merch
          NODE_OPTIONS: "--enable-source-maps"
      Policies:
        - DynamoDBCrudPolicy: { TableName: !Ref OrdersTable }
        - DynamoDBCrudPolicy: { TableName: !Ref ProductCountersTable }
        - S3ReadPolicy: { BucketName: !Ref AssetsBucket }
        # Allow the function to invoke itself (async dispatch path). The
        # arn:* form scopes to this function only — referencing
        # !GetAtt MerchFunction.Arn here would be self-referential.
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:drawbang-merch"
      Events:
        Products:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: GET
            Path: /merch/products
        Checkout:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /merch/checkout
        Webhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: POST
            Path: /merch/webhook/stripe
        Order:
          Type: HttpApi
          Properties:
            ApiId: !Ref IngestApi
            Method: GET
            Path: /merch/order/{id}

Outputs:
  OrdersTableName:
    Description: DynamoDB table for merch orders. Read by merch/orders.ts.
    Value: !Ref OrdersTable
  ProductCountersTableName:
    Description: DynamoDB table for (drawing_id, product_id) order counts. Read by the builder for /products.
    Value: !Ref ProductCountersTable
  UserStatsTableName:
    Description: DynamoDB table for per-account streak + total counters (#115/#116).
    Value: !Ref UserStatsTable
  UsersTableName:
    Description: DynamoDB table for email/password accounts (keyed by email).
    Value: !Ref UsersTable
  UsernamesTableName:
    Description: DynamoDB table reserving unique usernames.
    Value: !Ref UsernamesTable
  DrawingsTableName:
    Description: DynamoDB table backing the dynamic gallery/drawing/profile routes.
    Value: !Ref DrawingsTable
  BookmarksTableName:
    Description: DynamoDB table for per-user bookmarks (#201).
    Value: !Ref BookmarksTable
  FollowsTableName:
    Description: DynamoDB table for follow edges between accounts (#202).
    Value: !Ref FollowsTable
  IngestEndpoint:
    Description: POST here with the IngestRequest body.
    Value: !Sub "https://${IngestApi}.execute-api.${AWS::Region}.amazonaws.com/ingest"
  MerchEndpoint:
    Description: Base URL for merch routes. Stripe webhook target = MerchEndpoint + /webhook/stripe.
    Value: !Sub "https://${IngestApi}.execute-api.${AWS::Region}.amazonaws.com/merch"
  BucketName:
    Value: !Ref AssetsBucket
  CloudFrontDomain:
    Description: CloudFront-assigned domain (used for OAC reads from S3).
    Value: !GetAtt AssetsDistribution.DomainName
  CloudFrontDistributionId:
    Description: CloudFront distribution ID (for cache invalidations from CI).
    Value: !Ref AssetsDistribution
  PublicBaseUrl:
    Description: Canonical site origin — custom domain when configured, otherwise the cloudfront.net default.
    Value: !If
      - HasCustomDomain
      - !Sub "https://${DomainName}"
      - !Sub "https://${AssetsDistribution.DomainName}"
