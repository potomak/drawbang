<!doctype html>
<html lang="en">
  <head>
    <!--CHROME:ANALYTICS-->
    <!--CHROME:META-PIXEL-->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Draw! · Privacy</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!--CHROME:HEADER-->
    <main class="identity-page">
      <h2>Privacy</h2>
      <p>
        Draw! loads third-party analytics on every page. You can disable
        them with one click below; the choice is stored per-browser and
        <em>Do Not Track</em> is also honoured.
      </p>

      <div class="identity-pubkey" id="pv-status" data-state="loading">
        <code id="pv-status-text">Checking opt-out state…</code>
        <button class="btn" id="pv-toggle" type="button" disabled>Toggle</button>
      </div>
      <p class="muted" id="pv-reload-note" hidden>
        Reload the page to apply the new setting.
      </p>
    </main>
    <!--CHROME:FOOTER-->
    <script type="module" src="./src/privacy.ts"></script>
  </body>
</html>
