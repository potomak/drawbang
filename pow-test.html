<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Draw! · PoW test bed</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body class="pow-test-body">
    <!--CHROME:HEADER-->
    <main>
      <h1>PoW test bed</h1>
      <p class="muted">
        Solves a fake PoW challenge using <code>src/pow.ts</code> in a Web Worker.
        Pick the difficulty in bits, optionally re-run the benchmark, and click
        Solve. Results stack newest-first below.
      </p>

      <div class="row">
        <label>Bits
          <input id="bits" type="number" min="1" max="40" value="20" />
        </label>
        <label>Payload bytes
          <input id="payload" type="number" min="0" max="65536" value="256" />
        </label>
        <label>Baseline
          <select id="baseline">
            <option value="now">now (fresh)</option>
            <option value="fixed">fixed test string</option>
          </select>
        </label>
      </div>

      <div class="row">
        <label>Bench ms
          <input id="benchMs" type="number" min="50" max="2000" value="200" />
        </label>
        <button id="benchBtn">Run benchmark</button>
        <button id="solveBtn">Solve</button>
        <button id="stopBtn" disabled>Stop</button>
        <button id="clearBtn">Clear results</button>
      </div>

      <p id="status"></p>

      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>bits</th>
            <th>hps</th>
            <th>hashes</th>
            <th>solve ms</th>
            <th>nonce</th>
            <th>hash</th>
          </tr>
        </thead>
        <tbody id="results"></tbody>
      </table>
    </main>
    <!--CHROME:FOOTER-->
    <script type="module" src="./src/pow-test.ts"></script>
  </body>
</html>
