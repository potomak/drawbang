name: deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * *" # daily gallery rebuild
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BUCKET_NAME: drawbang-assets
  STACK_NAME: drawbang-ingest

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy-lambda:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
      ingest_endpoint: ${{ steps.outputs.outputs.ingest_endpoint }}
      public_base_url: ${{ steps.outputs.outputs.public_base_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Vendor arm64 ffmpeg binary into node_modules
        # The Lambda runs on arm64 but CI is x86_64, so `npm ci` skips
        # the optionalDependency @ffmpeg-installer/linux-arm64 as a
        # platform mismatch. `npm install --force` then reports the
        # package as "up to date" (the lockfile already resolved it as
        # skipped), so the install never re-runs. Bypass npm entirely:
        # pack the tarball directly and drop it where node_modules
        # expects so build-lambda.mjs's require.resolve finds it.
        run: |
          set -e
          PKG_VERSION=$(node -p "require('./package.json').optionalDependencies['@ffmpeg-installer/linux-arm64'].replace(/^\^/,'')")
          mkdir -p node_modules/@ffmpeg-installer
          rm -rf node_modules/@ffmpeg-installer/linux-arm64
          cd "$RUNNER_TEMP"
          npm pack "@ffmpeg-installer/linux-arm64@$PKG_VERSION" --quiet
          tar -xzf ffmpeg-installer-linux-arm64-*.tgz
          mv package "$GITHUB_WORKSPACE/node_modules/@ffmpeg-installer/linux-arm64"
          chmod +x "$GITHUB_WORKSPACE/node_modules/@ffmpeg-installer/linux-arm64/ffmpeg"
      - name: Build Lambda bundle
        # DRAWBANG_ASSET_VERSION is inlined into the bundle by esbuild's
        # `define` (see infra/aws/build-lambda.mjs). assetUrl() then
        # appends ?v=<sha> to every reference to a non-hashed static
        # asset (gallery-v2.css, like.js, share.js, flash.js, etc.) so
        # the browser refetches them immediately on each deploy.
        env:
          DRAWBANG_ASSET_VERSION: ${{ github.sha }}
        run: npm run lambda:build
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sam deploy
        working-directory: infra/aws
        env:
          PRINTIFY_API_TOKEN: ${{ secrets.PRINTIFY_API_TOKEN }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          # Not sensitive (a public From address) — a prod environment variable,
          # not a secret. secrets.* would resolve empty and skip the param.
          SES_FROM_ADDRESS: ${{ vars.SES_FROM_ADDRESS }}
          # Comma-separated usernames allowed to view /admin. Sourced from a
          # GitHub repository variable so adding/removing an admin is a click
          # in the repo settings, not a code edit.
          ADMIN_USERNAMES: ${{ vars.ADMIN_USERNAMES }}
        run: |
          # Read the prior deploy's CloudFront distribution id (if any) so
          # the Lambda env var can reference it without a CloudFormation
          # circular dependency. Empty on the first-ever deploy → Lambda
          # skips invalidation that one time.
          PRIOR_CF_ID=""
          if aws cloudformation describe-stacks --stack-name "$STACK_NAME" >/dev/null 2>&1; then
            PRIOR_CF_ID=$(aws cloudformation describe-stacks \
              --stack-name "$STACK_NAME" \
              --query 'Stacks[0].Outputs[?OutputKey==`CloudFrontDistributionId`].OutputValue' \
              --output text 2>/dev/null || true)
          fi
          # sam rejects an empty `Key=` override, so only pass params whose
          # value is non-empty. Optional secrets (SES, Printify, Stripe) that
          # aren't configured yet fall back to the template's "" default.
          PARAMS=("DomainName=pixel.drawbang.com")
          for kv in \
            "PrintifyApiToken=${PRINTIFY_API_TOKEN}" \
            "PrintifyShopId=${PRINTIFY_SHOP_ID}" \
            "StripeSecretKey=${STRIPE_SECRET_KEY}" \
            "StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET}" \
            "JwtSecret=${JWT_SECRET}" \
            "SesFromAddress=${SES_FROM_ADDRESS}" \
            "AdminUsernames=${ADMIN_USERNAMES}" \
            "CloudFrontDistributionIdOverride=${PRIOR_CF_ID}"; do
            [ -n "${kv#*=}" ] && PARAMS+=("$kv")
          done
          sam deploy --no-fail-on-empty-changeset --parameter-overrides "${PARAMS[@]}"
      - id: outputs
        name: Export stack outputs
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs' --output json > outputs.json
          jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"' outputs.json
          {
            echo "cloudfront_id=$(jq -r '.[]|select(.OutputKey=="CloudFrontDistributionId").OutputValue' outputs.json)"
            echo "ingest_endpoint=$(jq -r '.[]|select(.OutputKey=="IngestEndpoint").OutputValue' outputs.json)"
            echo "public_base_url=$(jq -r '.[]|select(.OutputKey=="PublicBaseUrl").OutputValue' outputs.json)"
          } >> "$GITHUB_OUTPUT"

  build-and-publish:
    # On push waits for deploy-lambda so we read freshly-deployed outputs.
    # On schedule deploy-lambda is skipped — we still run.
    needs: [test, deploy-lambda]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.deploy-lambda.result == 'success' || needs.deploy-lambda.result == 'skipped')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs
        id: stack
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs' --output json > outputs.json
          jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"' outputs.json
          {
            echo "cloudfront_id=$(jq -r '.[]|select(.OutputKey=="CloudFrontDistributionId").OutputValue' outputs.json)"
            echo "ingest_endpoint=$(jq -r '.[]|select(.OutputKey=="IngestEndpoint").OutputValue' outputs.json)"
            echo "public_base_url=$(jq -r '.[]|select(.OutputKey=="PublicBaseUrl").OutputValue' outputs.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Build editor
        # DRAWBANG_ASSET_VERSION is read by the chrome Vite plugin so the
        # editor SPAs ship the same `?v=<sha>` cache-bust on their
        # <link>/<script> tags as the Lambda templates do.
        env:
          VITE_INGEST_URL: ${{ steps.stack.outputs.ingest_endpoint }}
          VITE_DRAWING_BASE_URL: ${{ steps.stack.outputs.public_base_url }}/tiles
          DRAWBANG_ASSET_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Upload editor to S3 (public/)
        run: |
          # Hashed asset bundles (dist/assets/*.{js,css,map}) get the long
          # immutable cache — their filenames change on every build, so
          # browsers can hold them forever safely.
          #
          # Everything ELSE in dist/ — HTML entry points, plus un-hashed
          # static files copied from static/ (gallery.css, chrome-toggle.js,
          # chrome-identity.js, mockup PNGs, etc.) — uses a stable URL and
          # MUST stay short-cached + CloudFront-invalidated on every deploy.
          # Marking them immutable in the past trapped browsers on stale
          # versions of /gallery.css; never restore that behaviour.
          aws s3 sync dist/assets/ "s3://${BUCKET_NAME}/public/assets/" \
            --cache-control "public, max-age=31536000, immutable"
          aws s3 sync dist/ "s3://${BUCKET_NAME}/public/" \
            --exclude "assets/*" \
            --exclude "*.html" \
            --cache-control "public, max-age=300"
          for html in dist/*.html; do
            key=$(basename "$html")
            aws s3 cp "$html" "s3://${BUCKET_NAME}/public/$key" \
              --cache-control "public, max-age=60" \
              --content-type "text/html"
          done

      - name: Invalidate CloudFront cache
        # Wildcard wipes every cached object — covers the editor SPAs,
        # the dynamic /gallery + /d/<id> + /u/<un> + /feed.rss responses,
        # and any operator-replaceable static asset. A single "/*" counts
        # as one path against the 1000/month free invalidation quota.
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.cloudfront_id }}" \
            --paths "/*"
