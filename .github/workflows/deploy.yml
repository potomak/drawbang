name: deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: "0 6 * * *" # daily gallery rebuild
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  BUCKET_NAME: drawbang-assets
  STACK_NAME: drawbang-ingest

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy-lambda:
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      cloudfront_id: ${{ steps.outputs.outputs.cloudfront_id }}
      ingest_endpoint: ${{ steps.outputs.outputs.ingest_endpoint }}
      public_base_url: ${{ steps.outputs.outputs.public_base_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lambda:build
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: sam deploy
        working-directory: infra/aws
        env:
          PRINTIFY_API_TOKEN: ${{ secrets.PRINTIFY_API_TOKEN }}
          PRINTIFY_SHOP_ID: ${{ secrets.PRINTIFY_SHOP_ID }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          sam deploy --no-fail-on-empty-changeset \
            --parameter-overrides \
              "DomainName=pixel.drawbang.com" \
              "PrintifyApiToken=${PRINTIFY_API_TOKEN}" \
              "PrintifyShopId=${PRINTIFY_SHOP_ID}" \
              "StripeSecretKey=${STRIPE_SECRET_KEY}" \
              "StripeWebhookSecret=${STRIPE_WEBHOOK_SECRET}"
      - id: outputs
        name: Export stack outputs
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs' --output json > outputs.json
          jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"' outputs.json
          {
            echo "cloudfront_id=$(jq -r '.[]|select(.OutputKey=="CloudFrontDistributionId").OutputValue' outputs.json)"
            echo "ingest_endpoint=$(jq -r '.[]|select(.OutputKey=="IngestEndpoint").OutputValue' outputs.json)"
            echo "public_base_url=$(jq -r '.[]|select(.OutputKey=="PublicBaseUrl").OutputValue' outputs.json)"
          } >> "$GITHUB_OUTPUT"

  build-and-publish:
    # On push waits for deploy-lambda so we read freshly-deployed outputs.
    # On schedule deploy-lambda is skipped — we still run.
    needs: [test, deploy-lambda]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.deploy-lambda.result == 'success' || needs.deploy-lambda.result == 'skipped')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve stack outputs
        id: stack
        run: |
          aws cloudformation describe-stacks --stack-name "$STACK_NAME" --query 'Stacks[0].Outputs' --output json > outputs.json
          jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"' outputs.json
          {
            echo "cloudfront_id=$(jq -r '.[]|select(.OutputKey=="CloudFrontDistributionId").OutputValue' outputs.json)"
            echo "ingest_endpoint=$(jq -r '.[]|select(.OutputKey=="IngestEndpoint").OutputValue' outputs.json)"
            echo "public_base_url=$(jq -r '.[]|select(.OutputKey=="PublicBaseUrl").OutputValue' outputs.json)"
          } >> "$GITHUB_OUTPUT"

      - name: Build editor
        env:
          VITE_INGEST_URL: ${{ steps.stack.outputs.ingest_endpoint }}
          VITE_STATE_URL: ${{ steps.stack.outputs.public_base_url }}/state/last-publish.json
          VITE_DRAWING_BASE_URL: ${{ steps.stack.outputs.public_base_url }}/drawings
        run: npm run build

      - name: Upload editor to S3 (public/)
        run: |
          # Hashed asset bundles (JS/CSS/maps) get long-cached as immutable,
          # since their filenames change on every build. HTML entry points
          # use stable names, so they stay short-cached and we explicitly
          # invalidate them on every deploy (see next step).
          aws s3 sync dist/ "s3://${BUCKET_NAME}/public/" \
            --exclude "*.html" \
            --cache-control "public, max-age=31536000, immutable"
          for html in dist/*.html; do
            key=$(basename "$html")
            aws s3 cp "$html" "s3://${BUCKET_NAME}/public/$key" \
              --cache-control "public, max-age=60" \
              --content-type "text/html"
          done

      - name: Run gallery builder
        env:
          DRAWBANG_S3_BUCKET: ${{ env.BUCKET_NAME }}
          DRAWBANG_PUBLIC_BASE: ${{ steps.stack.outputs.public_base_url }}
          DRAWBANG_FORCE_RERENDER: "1"
        run: npm run builder

      - name: Invalidate CloudFront cache
        # Day pages are immutable per builder invariant. Everything below
        # this list is a stable URL whose contents may have changed this
        # deploy: the editor, the rolling gallery, every Vite-built SPA,
        # and the operator-replaceable mockup PNGs.
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.stack.outputs.cloudfront_id }}" \
            --paths \
              "/" "/index.html" \
              "/gallery" "/gallery.html" "/feed.rss" \
              "/merch" "/merch.html" \
              "/order.html" "/merch/order/*" \
              "/share" "/share.html" \
              "/mockups/*"
