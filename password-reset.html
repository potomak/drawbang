<!doctype html>
<html lang="en">
  <head>
    <!--CHROME:ANALYTICS-->
    <!--CHROME:META-PIXEL-->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Draw! · Reset password</title>
    <meta name="drawbang:active" content="identity" />
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <!--CHROME:HEADER-->
    <main class="identity-page">
      <h2>Choose a new password</h2>
      <form class="auth-form" id="password-reset-form" novalidate>
        <label class="auth-field">
          <span>New password</span>
          <input type="password" id="password-reset-new" name="password" autocomplete="new-password" minlength="8" required />
          <small class="muted">At least 8 characters.</small>
        </label>
        <button class="btn primary" id="password-reset-submit" type="submit">Set new password</button>
      </form>
    </main>
    <!--CHROME:FOOTER-->
    <script type="module" src="./src/password-reset.ts"></script>
  </body>
</html>
